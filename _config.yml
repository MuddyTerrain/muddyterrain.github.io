# In _config.yml

# Site Build Settings
markdown: kramdown
highlighter: rouge
permalink: /:title

# Kramdown settings for Github-Flavored Markdown and Rouge syntax highlighting
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
  auto_ids: true

# jekyll-paginate configuration
paginate: 5

# Plugins
plugins: [jekyll-paginate, jekyll-sitemap, jekyll-feed, jekyll-seo-tag]

# Customise atom feed settings (this is where Jekyll-Feed gets configuration information)
title: "Muddy Terrain Games"
description: "AI plugins for Unreal Engine. Integrate ChatGPT, Claude, Gemini, Llama, Mistral, DeepSeek, and 30+ LLMs into your game with GenAI for Unreal. Generate 3D models with AI. Run local AI with Ollama. Blueprint and C++ support."
url: "https://muddyterrain.com"
author: ""

# Collections with better permalink structure
collections:
  redirects:
    output: true
  docs:
    output: true
    permalink: /docs/:path/

# Exclude redirects from sitemap
defaults:
  - scope:
      path: ""
      type: "redirects"
    values:
      sitemap: false

# RSS 2.0 can be used instead of Atom by uncommenting following two lines
#feed:
#  path: rss-feed.xml